services:
  vtrack:
    build: .
    image: ghcr.io/redveera2000/aesthetix-v-track:1.9.3
    container_name: ${CONTAINER_NAME:-vtrack-app}
    restart: unless-stopped
    ports:
      - "${VTRACK_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}
      - SINGLE_USER_EMAIL=${SINGLE_USER_EMAIL:-veeradinesh219@gmail.com}
      - SINGLE_USER_PASSWORD=${SINGLE_USER_PASSWORD:-vtrackDefaultPassword123!}

name: 🚀 Deploy V-TRACK (Production)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 SSH Prod Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vtrack
            git fetch origin main
            git reset --hard origin/main
            
            # Inject Prod Environment Variables
            echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" > .env
            echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
            echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
            echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
            echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env
            echo "SINGLE_USER_EMAIL=${{ secrets.SINGLE_USER_EMAIL }}" >> .env
            echo "SINGLE_USER_PASSWORD=${{ secrets.SINGLE_USER_PASSWORD }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "CONTAINER_NAME=vtrack-app" >> .env
            echo "VTRACK_PORT=80" >> .env
            
            docker compose down
            docker compose build --no-cache
            docker compose up -d
